<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #202124;
        line-height: 1.5;
        padding: 16px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 6px;
      }

      .field-hint {
        color: #5f6368;
        font-size: 12px;
        font-weight: 400;
        margin-bottom: 6px;
      }

      input[type="text"],
      textarea {
        width: 100%;
        border: 1px solid #dadce0;
        border-radius: 4px;
        font-family: inherit;
        font-size: 14px;
        padding: 10px 12px;
        margin-bottom: 16px;
      }

      input[type="text"]:focus,
      textarea:focus {
        border-color: #1a73e8;
        outline: none;
      }

      textarea {
        min-height: 100px;
        resize: vertical;
      }

      input[type="file"] {
        display: block;
        font-size: 14px;
        margin-bottom: 12px;
      }

      .question-image-preview {
        display: block;
        max-width: 100%;
        height: auto;
        margin-bottom: 12px;
        border-radius: 4px;
      }

      .image-actions {
        margin-bottom: 16px;
      }

      button {
        background: #1a73e8;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        padding: 10px 24px;
      }

      button:hover {
        background: #1557b0;
      }

      button:disabled {
        background: #a8c7fa;
        cursor: not-allowed;
      }

      button.secondary {
        background: #fff;
        border: 1px solid #dadce0;
        color: #3c4043;
        margin-right: 8px;
      }

      button.secondary:hover {
        background: #f8f9fa;
      }

      .message {
        margin-top: 12px;
        font-size: 14px;
        padding: 12px;
        border-radius: 4px;
        display: none;
      }

      .message.success {
        background: #e6f4ea;
        color: #137333;
        display: block;
      }

      .message.error {
        background: #fce8e6;
        color: #c5221f;
        display: block;
      }

      .processing-overlay {
        align-items: center;
        background: rgba(32, 33, 36, 0.45);
        display: none;
        inset: 0;
        justify-content: center;
        position: fixed;
        z-index: 1000;
      }

      .processing-dialog {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
        min-width: 220px;
        padding: 28px 32px;
        text-align: center;
      }

      .processing-spinner {
        animation: spin 0.9s linear infinite;
        border: 3px solid #e8f0fe;
        border-radius: 50%;
        border-top-color: #1a73e8;
        height: 36px;
        margin: 0 auto 16px;
        width: 36px;
      }

      .processing-spinner.done {
        animation: none;
        border: none;
        color: #137333;
        font-size: 32px;
        height: auto;
        line-height: 1;
        width: auto;
      }

      .processing-message {
        color: #202124;
        font-size: 15px;
        font-weight: 500;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <form id="addForm" onsubmit="handleAddQuestion(event)">
      <label for="quizName">Quiz Name</label>
      <p class="field-hint">Reuse the same name to add another question to an existing quiz.</p>
      <input type="text" id="quizName" required placeholder="e.g. Genetics Unit Quiz">

      <label for="newQuestion">Question</label>
      <textarea id="newQuestion" required placeholder="Enter the question..."></textarea>

      <label for="newRubric">Rubric</label>
      <textarea id="newRubric" required placeholder="List requested facts and common misconceptions (scored 0–4 per Grading for Equity)..."></textarea>

      <label for="questionImage">Question Image (optional)</label>
      <p class="field-hint">PNG or GIF only, max 1 MB. Charts and tables work well.</p>
      <input type="file" id="questionImage" accept=".png,.gif,image/png,image/gif">
      <img id="questionImagePreview" class="question-image-preview" alt="Question image preview" style="display:none;">
      <div class="image-actions">
        <button type="button" class="secondary" id="clearQuestionImageBtn" style="display:none;" onclick="clearQuestionImage()">Remove image</button>
      </div>

      <button type="submit" id="addBtn">Save Question</button>
    </form>
    <div class="message" id="message"></div>

    <div id="processingOverlay" class="processing-overlay">
      <div class="processing-dialog">
        <div id="processingSpinner" class="processing-spinner"></div>
        <div id="processingMessage" class="processing-message">Processing...</div>
      </div>
    </div>

    <script>
      var pendingQuestionImageData = '';
      var MAX_QUESTION_IMAGE_BYTES = 1048576;
      var processingTimer = null;

      function showProcessing(message) {
        if (processingTimer) {
          clearTimeout(processingTimer);
          processingTimer = null;
        }
        document.getElementById('processingSpinner').className = 'processing-spinner';
        document.getElementById('processingSpinner').textContent = '';
        document.getElementById('processingMessage').textContent = message || 'Processing...';
        document.getElementById('processingOverlay').style.display = 'flex';
      }

      function showDone(message) {
        var spinner = document.getElementById('processingSpinner');
        spinner.className = 'processing-spinner done';
        spinner.textContent = '\u2713';
        document.getElementById('processingMessage').textContent = message || 'Done!';
        processingTimer = setTimeout(function() {
          document.getElementById('processingOverlay').style.display = 'none';
          processingTimer = null;
        }, 700);
      }

      function hideProcessing() {
        if (processingTimer) {
          clearTimeout(processingTimer);
          processingTimer = null;
        }
        document.getElementById('processingOverlay').style.display = 'none';
      }

      document.getElementById('questionImage').addEventListener('change', handleQuestionImageSelected);

      function readQuestionImageFile(input, onReady, onError) {
        var file = input.files && input.files[0];
        if (!file) {
          onReady('');
          return;
        }

        var type = (file.type || '').toLowerCase();
        if (type !== 'image/png' && type !== 'image/gif') {
          onError('Only PNG and GIF images are allowed.');
          return;
        }
        if (file.size > MAX_QUESTION_IMAGE_BYTES) {
          onError('Image must be 1 MB or smaller.');
          return;
        }

        var reader = new FileReader();
        reader.onload = function(event) {
          onReady(event.target.result);
        };
        reader.onerror = function() {
          onError('Could not read the image file.');
        };
        reader.readAsDataURL(file);
      }

      function handleQuestionImageSelected() {
        var input = document.getElementById('questionImage');
        var preview = document.getElementById('questionImagePreview');
        var clearBtn = document.getElementById('clearQuestionImageBtn');

        readQuestionImageFile(input, function(dataUrl) {
          pendingQuestionImageData = dataUrl;
          if (dataUrl) {
            preview.src = dataUrl;
            preview.style.display = 'block';
            clearBtn.style.display = 'inline-block';
          } else {
            preview.src = '';
            preview.style.display = 'none';
            clearBtn.style.display = 'none';
          }
        }, function(errorMessage) {
          input.value = '';
          clearQuestionImage();
          showError(errorMessage);
        });
      }

      function clearQuestionImage() {
        pendingQuestionImageData = '';
        document.getElementById('questionImage').value = '';
        document.getElementById('questionImagePreview').src = '';
        document.getElementById('questionImagePreview').style.display = 'none';
        document.getElementById('clearQuestionImageBtn').style.display = 'none';
      }

      function showError(text) {
        var message = document.getElementById('message');
        message.textContent = text;
        message.className = 'message error';
      }

      function handleAddQuestion(event) {
        event.preventDefault();

        var quizName = document.getElementById('quizName').value.trim();
        var question = document.getElementById('newQuestion').value.trim();
        var rubric = document.getElementById('newRubric').value.trim();
        var btn = document.getElementById('addBtn');
        var message = document.getElementById('message');
        var imageInput = document.getElementById('questionImage');
        var hadFile = !!(imageInput.files && imageInput.files[0]);
        var hadPending = !!pendingQuestionImageData;

        if (!quizName || !question || !rubric) {
          showError('Quiz name, question, and rubric are all required.');
          return;
        }

        function submitQuestion(imageData) {
          if (!imageData && (hadFile || hadPending)) {
            showError('The image could not be read from the file picker.');
            return;
          }

          btn.disabled = true;
          message.className = 'message';
          message.style.display = 'none';
          showProcessing('Saving question...');

          google.script.run
            .withSuccessHandler(function(result) {
              showDone('Done!');
              btn.disabled = false;
              document.getElementById('addForm').reset();
              clearQuestionImage();
              message.textContent = result.message;
              message.className = 'message success';
            })
            .withFailureHandler(function(err) {
              hideProcessing();
              btn.disabled = false;
              showError(err.message || String(err));
            })
            .addQuestionAndRubric({
              quizName: quizName,
              question: question,
              rubric: rubric,
              imageData: imageData || ''
            });
        }

        if (imageInput.files && imageInput.files[0]) {
          readQuestionImageFile(imageInput, submitQuestion, showError);
          return;
        }

        if (pendingQuestionImageData) {
          submitQuestion(pendingQuestionImageData);
          return;
        }

        submitQuestion('');
      }
    </script>
  </body>
</html>
